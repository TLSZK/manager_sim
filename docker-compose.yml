services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: manager_sim
      MYSQL_ROOT_PASSWORD: your_secure_password
      MYSQL_USER: manager_user
      MYSQL_PASSWORD: your_secure_password
    volumes:
      - db_data:/var/lib/mysql
    # No ports exposed here for security

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://161.97.86.96:8000
      DB_HOST: db
      DB_DATABASE: manager_sim
      DB_USERNAME: manager_user
      DB_PASSWORD: your_secure_password
    ports:
      - "8000:80"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://161.97.86.96:8000/api
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: