<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Liga Manager Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    @import "tailwindcss";

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      /* Slate 900 */
      color: #f8fafc;
      /* Slate 50 */
    }

    /* Aggressively remove native focus rings and tap highlights globally */
    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
    }

    *:focus, *:active, *:focus-visible {
      outline: none !important;
    }

    button::-moz-focus-inner {
      border: 0;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* --- Custom Animations for React Components --- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes zoomIn95 {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes slideInBottom4 {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInBottom2 {
      from { opacity: 0; transform: translateY(0.5rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInTop4 {
      from { opacity: 0; transform: translateY(-1rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInTop2 {
      from { opacity: 0; transform: translateY(-0.5rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInRight4 {
      from { opacity: 0; transform: translateX(1rem); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Base animation trigger class */
    .animate-in {
      animation-duration: 300ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Specific interaction types used in App.tsx */
    .fade-in { animation-name: fadeIn; }
    .zoom-in-95 { animation-name: zoomIn95; }
    .slide-in-from-bottom-4 { animation-name: slideInBottom4; }
    .slide-in-from-bottom-2 { animation-name: slideInBottom2; }
    .slide-in-from-top-4 { animation-name: slideInTop4; }
    .slide-in-from-top-2 { animation-name: slideInTop2; }
    .slide-in-from-right-4 { animation-name: slideInRight4; }
    
    /* Duration utility overrides for cascading effects */
    .duration-200 { animation-duration: 200ms !important; }
    .duration-300 { animation-duration: 300ms !important; }
    .duration-500 { animation-duration: 500ms !important; }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
